# ============================================================================
# experiment-configs.yml - 最终实验配置矩阵(两检测器收口版)
# 检测面 = per-feature 检测器(IKS 或 HDDM_W,分支级并存)+ 聚合器 → COMMITTED;
# 打分面 = STABLE → COOLDOWN → WAITING → STABLE(D1a 重训,默认 cooldownPolicy=d1a /
# d1aFill=cooldownsamples)。
#
# 检测器并存方式:分支级。
#   - per-feature IKS     → 分支 feature/per-feature-iks
#   - per-feature HDDM_W  → 分支 feature/per-feature-hddm_w(PerFeatureHDDMFunction)
# 同一套 plan 在两个分支上分别跑,结果合并对比。本 yml 的 plan_extras 中,IKS 专属参数
# (iksWindowSize/iksPValue)与 HDDM_W 专属参数(hddmLambda/hddmScaleMode 等)按所在分支
# 取用——在 IKS 分支跑时 HDDM 参数被静默忽略,反之亦然。
#
# 数据集主线:INSECTS_abrupt_imbalanced + INSECTS_gradual_imbalanced(真实、难度可比、
# 归一化与特征健康度均已离线验证)。synth_* 仅作定性示意,不进定量主表(8σ 强度会系统
# 性高估,详见 dataset_suitability_probe.md)。INSECTS incremental / incremental-
# reoccurring 因 per-feature 架构不适配(全程渐变无离散点 / 来回切换信号过弱)排除,
# 作架构边界讨论。
# ============================================================================

# ---------- 算法注册(--algorithm → --detector 映射)----------
# run-experiment.sh 第 60 行用 `cfg_query algorithm <id> detector` 查此段,
# 得到的值经 --detector 传给 LocalProcessor(LocalProcessor 默认 iks,匹配 hddm_w)。
# plan 内的 `algorithms: [HDDM_W]` 即引用此处的 key。
algorithms:
  HDDM_W:
    detector: HDDM_W

# ---------- 配置矩阵 ----------
# pauseMode (PauseMode.java) —— COOLDOWN/WAITING 期打分行为:
#   USE_OLD_FOREST           继续用旧森林打分输出
#   BACKLOG_THEN_NEW_FOREST  数据进 backlog,等新森林到来后批量打分(生产意图,主指标取此)
configs:
  USE_OLD_FOREST:
    pauseMode: USE_OLD_FOREST
  BACKLOG_THEN_NEW_FOREST:
    pauseMode: BACKLOG_THEN_NEW_FOREST

# ---------- 实验计划 ----------
# 执行顺序(总策略:λ 扫描 → EXP1 选胜者 → EXP2/3 → EXP4 汇总):
#   0. smoke_batch         批量调度验证
#   1. lambda_sweep        【HDDM_W 分支专属,EXP1 前置】每数据集扫最优 λ*
#   2. exp1_hddm_w         HDDM_W 分支,用各数据集 λ* 跑核心网格
#   3. exp1_iks            IKS 分支,跑同一核心网格
#      → 比较 exp1_hddm_w 与 exp1_iks 的 overall_auc,胜者为主检测器
#   4. exp2                主检测器,stationary 误触发基线(多样数据集)
#   5. exp3                主检测器,扩展性(多样数据集)
#   6. EXP4                无需重跑:直接用 exp1_hddm_w + exp1_iks 的结果交叉分析
plans:

  # ---- 0. 冒烟:批量调度验证(synth_abrupt × 2 pauseMode × 1 = 2) ----
  # 仅验证 run-batch.sh 串行调度 + 实验间 topic 清理 + 断点续跑;synth_abrupt 在此
  # 只作机制冒烟,不产定量结论。
  smoke_batch:
    datasets: [synth_abrupt]
    configs: [USE_OLD_FOREST, BACKLOG_THEN_NEW_FOREST]
    repeats: 1

  # ---- 1. λ 扫描(HDDM_W 分支专属,EXP1 前置)----
  # 目的:为 HDDM_W 在每个数据集上定最优 λ*,避免 EXP1 用未调好的 λ 与 IKS 比较而引入
  # "参数没调好"混淆。每数据集各取最优 λ(abrupt/gradual 最优 λ 可能不同,这一差异本身
  # 是发现:HDDM_W 最优 λ 依赖漂移形态)。
  #
  # 接口说明(已核 cfg_query.py):带 `configurations` 字段的 plan 走 expand_configurations,
  # 要求 **单数据集 `dataset` + 单配置 `config`**,每个 configuration 是一组 k=v 一起传入。
  # 故 λ 扫描按数据集拆成两个 plan。parallelism 走 .env 默认 JOB_LOCAL_PARALLELISM=4(= P4)。
  # config 固定 BACKLOG(生产意图、主指标口径)。每点显式带 hddmScaleMode + aggK,不依赖兜底。
  # 仅在 feature/per-feature-hddm_w 分支运行。
  # 每 plan 规模 = 3 λ × 3 repeats = 9;两 plan 合计 18。
  lambda_sweep_abrupt:
    dataset: insects_abrupt_imbalanced
    config: BACKLOG_THEN_NEW_FOREST
    repeats: 3
    configurations:
      - { detector: HDDM_W, hddmLambda: 0.002, hddmScaleMode: p99, aggK: 2 }
      - { detector: HDDM_W, hddmLambda: 0.005, hddmScaleMode: p99, aggK: 2 }
      - { detector: HDDM_W, hddmLambda: 0.010, hddmScaleMode: p99, aggK: 2 }

  lambda_sweep_gradual:
    dataset: insects_gradual_imbalanced
    config: BACKLOG_THEN_NEW_FOREST
    repeats: 3
    configurations:
      - { detector: HDDM_W, hddmLambda: 0.002, hddmScaleMode: p99, aggK: 2 }
      - { detector: HDDM_W, hddmLambda: 0.005, hddmScaleMode: p99, aggK: 2 }
      - { detector: HDDM_W, hddmLambda: 0.010, hddmScaleMode: p99, aggK: 2 }

  # ---- 2. EXP1 — HDDM_W 臂(在 feature/per-feature-hddm_w 分支跑)----
  # λ* 由 lambda_sweep 集群结果选出(中位 overall_auc,BACKLOG×P4):
  #   abrupt:  λ*=0.002(中位 0.7302;0.005→0.670;0.01→0.615,单调越小越好)
  #   gradual: λ*=0.005(中位 0.5399;0.002→0.498 最差;0.01→0.513)
  # 两数据集 λ* 不同 → 拆成两个单数据集 plan。此差异本身是论文发现:
  # HDDM_W 最优 λ 依赖漂移形态(abrupt 偏好更小 λ / 更长记忆窗)。
  # 每 plan 规模 = 1 ds × 2 pauseMode × P∈{1,2,4} × 3 repeats = 18;合计 36。
  exp1_hddm_w_abrupt:
    algorithms: [HDDM_W]
    datasets: [insects_abrupt_imbalanced]
    configs: [USE_OLD_FOREST, BACKLOG_THEN_NEW_FOREST]
    parallelism_grid: [1, 2, 4]
    repeats: 3
    plan_extras:
      detector: HDDM_W
      hddmLambda: 0.002
      hddmScaleMode: p99
      aggK: 2

  exp1_hddm_w_gradual:
    algorithms: [HDDM_W]
    datasets: [insects_gradual_imbalanced]
    configs: [USE_OLD_FOREST, BACKLOG_THEN_NEW_FOREST]
    parallelism_grid: [1, 2, 4]
    repeats: 3
    plan_extras:
      detector: HDDM_W
      hddmLambda: 0.005
      hddmScaleMode: p99
      aggK: 2

  # ---- 3. EXP1 — IKS 臂(在 feature/per-feature-iks 分支跑)----
  # 与 HDDM_W 臂同网格、同配置,仅检测器不同(分支不同)。这是 EXP1 单变量对比的
  # IKS 基线。已知 insects_abrupt × p4 × BACKLOG overall_auc 中位 0.760。
  # 规模 = 2 datasets × 2 pauseMode × P∈{1,2,4} × 3 repeats = 36
  exp1_iks:
    datasets:
      - insects_abrupt_imbalanced
      - insects_gradual_imbalanced
    configs: [USE_OLD_FOREST, BACKLOG_THEN_NEW_FOREST]
    parallelism_grid: [1, 2, 4]
    repeats: 3
    plan_extras:
      iksWindowSize: 2000
      iksPValue: 0.001
      aggK: 2

  # ---- 4. EXP2 — stationary 误触发率基线(主检测器,多样数据集)----
  # per-feature 在无漂移流上应几乎不 fire = 精度基线。保留多样数据集(非 INSECTS),
  # 因为误触发基线需要分布多样性,与"INSECTS 为主"不冲突。用 EXP1 选出的主检测器
  # 所在分支跑。规模 = 5 datasets × 30 shuffle = 150。
  exp2:
    datasets: [donors, http, forestcover, fraud, mulcross]
    configs: [USE_OLD_FOREST]
    repeats: 30
    shuffle: true
    plan_extras:
      aggK: 2
      # 检测器参数按主检测器所在分支填(IKS: iksWindowSize/iksPValue;
      # HDDM_W: hddmLambda/hddmScaleMode)。

  # ---- 5. EXP3 — 扩展性 + Fork 2(主检测器,多样数据集)----
  # 升 Fork 2 时改 .env 的 SOURCE_PARTITIONS=P_d。保留 donors/http(大流、适合压扩展性)。
  # 规模 = 2 datasets × P∈{1,2,4,6} × 3 repeats = 24。
  exp3:
    datasets: [donors, http]
    configs: [BACKLOG_THEN_NEW_FOREST]
    parallelism_grid: [1, 2, 4, 6]
    repeats: 3
    plan_extras:
      aggK: 2

  # ---- 6. EXP4 — 检测器–漂移形态匹配律 ----
  # 不单独跑:直接取 exp1_hddm_w 与 exp1_iks 在 INSECTS_abrupt / INSECTS_gradual 上的
  # overall_auc 交叉分析(2 检测器 × 2 形态),配合离线 ε 下界分析(devspec §7)。
  # synth 形态示意从离线 hddm_signal_batch.py 的定性区取,不进集群。
  # 故此 plan 为分析口径标记,无新增集群运行。

  # ---- 7. IKS 参数敏感性(OAT,IKS 分支)----
  # 论文 IKS 检测器的参数稳健性附录。单数据集、单 pauseMode,OAT(one-at-a-time)
  # 逐参数扫,其余取默认。ksConfirm 已废(默认关闭、离线标定失败),不扫。
  # 在 feature/per-feature-iks 分支运行。
  # 规模 = (3 iksWindowSize + 3 ringBufferSize + 3 cooldownSamples − 2 重复基线点)× 3 repeats
  #       ≈ 7 个独立点 × 3 = 21(aggK 已在 EXP1 注释中由集群验证否决 aggK=3,此处可选扫)
  sensitivity_iks:
    dataset: insects_abrupt_imbalanced
    config: BACKLOG_THEN_NEW_FOREST
    repeats: 3
    plan_extras:
      iksPValue: 0.001
      aggK: 2
      # 注意:iksWindowSize 不在此(它在 grids 里扫)。若放进 plan_extras 会与 grids 重复,
      # expand_sensitivity 拼接后 run-experiment 通用翻译时后者覆盖前者,导致 iksWindowSize
      # 恒为 2000、OAT 扫不到 1000/4000(静默失效)。扫其它维时 iksWindowSize 取代码默认 2000,与意图一致。
    grids:
      iksWindowSize: [1000, 2000, 4000]
      ringBufferSize: [512, 1000, 2000]
      cooldownSamples: [1000, 2000, 5000]

  # ---- 8. HDDM_W 参数敏感性(HDDM_W 分支)----
  # 与 IKS sensitivity 对称,供论文并列呈现两检测器参数稳健性。λ 已在 lambda_sweep 充分
  # 扫描,此处补 scaleMode 与 warmup。用 configurations 形式(非 grids),以便每点携带
  # detector: HDDM_W —— grids/OAT 展开不透传 detector,会误跑 IKS。
  # 规模 = 5 点 × 3 repeats = 15。hddmLambda 用 lambda_sweep 选出的 abrupt λ* 替换。
  sensitivity_hddm_w:
    dataset: insects_abrupt_imbalanced
    config: BACKLOG_THEN_NEW_FOREST
    repeats: 3
    configurations:
      - { detector: HDDM_W, hddmLambda: 0.005, hddmScaleMode: p99,    hddmWarmup: 2000, aggK: 2 }
      - { detector: HDDM_W, hddmLambda: 0.005, hddmScaleMode: maxdev, hddmWarmup: 2000, aggK: 2 }
      - { detector: HDDM_W, hddmLambda: 0.005, hddmScaleMode: p99,    hddmWarmup: 1000, aggK: 2 }
      - { detector: HDDM_W, hddmLambda: 0.005, hddmScaleMode: p99,    hddmWarmup: 4000, aggK: 2 }

# ---------- λ 扫描结果回填区(lambda_sweep 跑完手动填)----------
# insects_abrupt_imbalanced:  λ* = ____  (overall_auc ____)
# insects_gradual_imbalanced: λ* = ____  (overall_auc ____)
