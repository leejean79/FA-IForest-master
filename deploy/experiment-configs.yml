# ============================================================================
# experiment-configs.yml - 实验配置矩阵 (方向二(a) Phase 3)
# 检测面 = per-feature IKS + 峰值-KS 确认 + 聚合器 → COMMITTED;打分面只剩
# STABLE → COOLDOWN → WAITING → STABLE。WARN / 投票 / HDDM 置信度 维度全废。
# 详见 HANDOVER_direction2a_phase3_arch.md。
# ============================================================================

# ---------- 配置矩阵 (收缩到一个维度) ----------
# pauseMode (PauseMode.java) —— COOLDOWN/WAITING 期打分行为:
#   USE_OLD_FOREST           继续用旧森林打分输出
#   BACKLOG_THEN_NEW_FOREST  数据进 backlog,等新森林到来后批量打分
# 原 C1-C4 的 warnTimeoutBehavior 维度已废 (无 WARN 子状态了)。
configs:
  USE_OLD_FOREST:
    pauseMode: USE_OLD_FOREST
  BACKLOG_THEN_NEW_FOREST:
    pauseMode: BACKLOG_THEN_NEW_FOREST

# ---------- 算法 (EXP4 可选) ----------
# 主路径固定 per-feature IKS,不走 algorithms 段;EXP4 才用它切到 per-feature HDDM。
# 旧的 score 域 HDDM_A* / HDDM_W 不再驱动主实验,仅留作 EXP4 对照备用。
algorithms:
  # 默认主路径:per-feature IKS (无需在此显式注册)
  # EXP4: per-feature HDDM 备用,等 PerFeatureHDDMFunction 实现后开放
  # HDDM_A:
  #   detector: HDDM_A_Windowed
  # HDDM_W:
  #   detector: HDDM_W

# ---------- 实验计划 ----------
plans:
  # smoke_batch: 批量调度验证 (synth_abrupt × 2 pauseMode × 1 = 2)
  # 用途: 验证 run-batch.sh 串行调度 + 实验间 topic 清理 + 断点续跑
  smoke_batch:
    datasets: [synth_abrupt]
    configs: [USE_OLD_FOREST, BACKLOG_THEN_NEW_FOREST]
    repeats: 1

  # EXP1 (核心): 新臂 across P — 端到端闭环 + 消稀释 (P-不变) + AUC 恢复 + 真实重训频率。
  # 网格 = datasets × P∈{1,2,4} × pauseMode × repeats[3]
  # 三观测项 (恢复曲线 / v1-v2 森林对比 / 重训频率) 离线从 scores.jsonl + model-topic.jsonl
  # 重建,见 HANDOVER 附录 B。
  # 旧臂 (score 行并行) 不在本 plan;若需对比,切到 Phase 3 前的 build 跑同网格,
  # 或直接引用 finding 1 已记录的稀释数 (INSECTS abrupt:p=1→342 WARN, p=4→0)。
  exp1:
    datasets:
      - synth_abrupt
      - insects_abrupt_imbalanced
      - insects_gradual_imbalanced
    configs: [USE_OLD_FOREST, BACKLOG_THEN_NEW_FOREST]
    parallelism_grid: [1, 2, 4]
    repeats: 3
    plan_extras:
      iksWindowSize: 2000
      iksPValue: 0.001
      # Route C (aggK=3) 经集群验证否决 —— insects_abrupt 上 n_committed 未下降、
      # overall_auc 反而由 0.736 降到 0.688,故沿用 aggK=2;代码默认值
      # (CoordinatorJob aggK=2) 无需改动,此处显式写出保留参数透传链路的可见性。
      aggK: 2

  # EXP2: stationary 误触发率 (5 数据集 × 30 shuffle = 150)
  # per-feature 在无漂移流上应几乎不 fire = 精度基线;config 取 USE_OLD_FOREST 即可。
  exp2:
    datasets: [donors, http, forestcover, fraud, mulcross]
    configs: [USE_OLD_FOREST]
    repeats: 30
    shuffle: true

  # EXP3: 扩展性 + Fork 2 (source partition=P) — 2 数据集 × 4 P × 3 repeat = 24
  # 升 Fork 2 时改 .env 的 SOURCE_PARTITIONS=P_d (脚本默认 Fork 1 = 1)。
  exp3:
    datasets: [donors, http]
    configs: [BACKLOG_THEN_NEW_FOREST]
    parallelism_grid: [1, 2, 4, 6]
    repeats: 3

  # EXP4 (可选): per-feature IKS vs per-feature HDDM,等 PerFeatureHDDMFunction 落地再开。
  exp4:
    datasets: [synth_abrupt, insects_abrupt_imbalanced]
    configs: [BACKLOG_THEN_NEW_FOREST]
    repeats: 3
    enabled: false

  # Sensitivity: 参数敏感性 (单数据集, OAT 扫 4 个参数)
  # 旧的 hddmWindowSize 改为 iksWindowSize;新增 aggK / ksConfirm 两个检测面维度;
  # ringBufferSize / cooldownSamples 保留 (打分面 COOLDOWN 仍有)。
  sensitivity:
    dataset: synth_abrupt
    config: BACKLOG_THEN_NEW_FOREST
    grids:
      iksWindowSize: [1000, 2000, 4000]
      aggK: [1, 2, 3]
      ksConfirm: [0.04, 0.05, 0.08, 0.12]
      ringBufferSize: [256, 512, 1000, 2000]
      cooldownSamples: [1000, 2000, 5000]
    repeats: 3
