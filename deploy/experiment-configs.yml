# ============================================================================
# experiment-configs.yml - 实验配置矩阵
# 所有参数名/值都已核对代码真实存在 (grep -rn src/main/java/)
# ============================================================================

# ---------- 实验 1: C1-C4 配置 ----------
# 两个维度的 2x2:
#   pauseMode (PauseMode.java):
#     USE_OLD_FOREST           暂停期间继续用旧森林打分, HDDM 暂停
#     BACKLOG_THEN_NEW_FOREST  数据进 backlog, 等新森林到来后批量打分
#   warnTimeoutBehavior (WarnTimeoutBehavior.java):
#     DISCARD   WARN 超时后丢弃 candidateTrees, 回 STABLE
#     PROMOTE   WARN 超时后视为漂移确认, 发出新树
configs:
  C1:
    pauseMode: USE_OLD_FOREST
    warnTimeoutBehavior: DISCARD
  C2:
    pauseMode: USE_OLD_FOREST
    warnTimeoutBehavior: PROMOTE
  C3:
    pauseMode: BACKLOG_THEN_NEW_FOREST
    warnTimeoutBehavior: DISCARD
  C4:
    pauseMode: BACKLOG_THEN_NEW_FOREST
    warnTimeoutBehavior: PROMOTE

# ---------- 实验 4: 算法对比 ----------
# detector 参数 (LocalProcessor --detector)
# ⚠️ 代码现状 (LocalProcessorFunction.java switch): 只实现了 HDDM_A 和 HDDM_A_Windowed
#    HDDM_W_Windowed 和 IKS 还没实现, 传进去会抛 IllegalArgumentException
#    实验 4 要等这两个 detector 实现后才能跑
algorithms:
  HDDM_A:
    detector: HDDM_A_Windowed        # 已实现 ✅
  HDDM_A_Cumulative:
    detector: HDDM_A                 # 已实现 ✅ (累积版, 非窗口)
  HDDM_W:
    detector: HDDM_W
  # IKS:
  #   detector: IKS                   # ❌ 未实现

# ---------- 实验计划 ----------
plans:
  # smoke_batch: 批量调度验证 (synth_abrupt x 4配置 x 1次 = 4)
  # 用途: 验证 run-batch.sh 串行调度 + 实验间 topic 清理 + 断点续跑
  # 不是正式实验, 验证完可忽略
  smoke_batch:
    datasets: [synth_abrupt]
    configs: [C1, C2, C3, C4]
    repeats: 1

  # 实验 1: 漂移检测 (6 数据集 x 4 配置 x 5 重复 = 120)
  exp1:
    datasets:
      - synth_abrupt
      - synth_gradual
      - synth_incremental
      - synth_reoccurring
      - insects_abrupt_imbalanced
      - insects_gradual_imbalanced
    configs: [C1, C2, C3, C4]
    repeats: 5

  # 实验 1 的 HDDM_W 算法版 (与 exp1 同样的 datasets/configs/repeats, 只切换算法)
  # 跑完后可与 exp1 (HDDM_A_Windowed 默认) 的结果做算法对比
  # plan_extras: 整个 plan 共用的额外参数, 注入到每行 extra 列 → run-experiment 翻译为 --hddmLambda 0.1
  exp1_hddm_w:
    datasets:
      - synth_abrupt
      - synth_gradual
      - synth_incremental
      - synth_reoccurring
      - insects_abrupt_imbalanced
      - insects_gradual_imbalanced
    configs: [C1, C2, C3, C4]
    algorithms: [HDDM_W]
    repeats: 5
    plan_extras:
      hddmLambda: 0.1

  # 实验 2: stationary AUC (5 数据集 x 30 shuffle = 150)
  # 注: 用 C1 (代码默认配置), 每次 shuffle 用不同 seed
  exp2:
    datasets: [donors, http, forestcover, fraud, mulcross]
    configs: [C1]
    repeats: 30
    shuffle: true              # 每次重复用不同 seed shuffle 数据

  # 实验 3: 可扩展性 (2 数据集 x 4 parallelism x 3 重复 = 24)
  exp3:
    datasets: [donors, http]
    configs: [C4]
    parallelism_grid: [1, 2, 4, 6]
    repeats: 3

  # 实验 4: 算法对比 (3 数据集 x 3 算法 x 5 重复 = 45)
  # ⚠️ 暂不可跑: IKS / HDDM_W_Windowed 未实现 (见上方 algorithms 注释)
  #    等算法实现后, 把 algorithms 改回 [HDDM_A, HDDM_W, IKS] 即可
  exp4:
    datasets: [synth_abrupt, insects_gradual_imbalanced, synth_incremental]
    configs: [C4]
    algorithms: [HDDM_A, HDDM_A_Cumulative]    # 临时: 只跑已实现的两个
    repeats: 5
    enabled: false                              # run-batch.sh 会跳过 enabled=false 的 plan

  # Sensitivity: 参数敏感性 (单数据集, 扫描 3 个参数)
  sensitivity:
    dataset: synth_abrupt
    config: C4
    grids:
      ringBufferSize: [256, 512, 1000, 2000]
      hddmWindowSize: [1000, 2000, 4000]
      cooldownSamples: [1000, 2000, 5000]
    repeats: 3

  # 敏感性测试：HDDM 置信度参数（成对放宽倍率扫描）
  # 基线 + 10× / 20× / 40× 放宽，看 stable 假阳率随阈值放宽如何变化
  sensitivity_hddm_conf:
    dataset: insects_abrupt_imbalanced
    config: C4
    configurations:
      - { warnConfidence: 0.005, driftConfidence: 0.001 }   # 基线
      - { warnConfidence: 0.05,  driftConfidence: 0.01  }   # 10×
      - { warnConfidence: 0.1,   driftConfidence: 0.02  }   # 20×
      - { warnConfidence: 0.2,   driftConfidence: 0.04  }   # 40× 上限对照
    repeats: 3
