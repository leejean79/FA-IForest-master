# Flink 1.13 使用 log4j2，本配置让 LocalProcessor 和 CoordinatorJob 的日志写到本地文件
# Logback config for Flink 1.13: write LocalProcessor / CoordinatorJob logs to local files.
#
# 文件位置 / File locations (Flink 启动目录下):
#   logs/local-processor.log     LocalProcessor 主日志
#   logs/coordinator.log         CoordinatorJob 主日志
#   logs/all.log                 所有日志（含 Flink 框架）

rootLogger.level = INFO
rootLogger.appenderRef.console.ref = ConsoleAppender
rootLogger.appenderRef.allFile.ref = AllFile

# 控制台 appender（保留原有 stdout 输出）
appender.console.name = ConsoleAppender
appender.console.type = Console
appender.console.target = SYSTEM_OUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss.SSS} [%t] %-5p %c{1} - %m%n

# 所有日志写一个总文件（含 Flink 框架日志，便于排查框架问题）
appender.allFile.name = AllFile
appender.allFile.type = RollingFile
appender.allFile.fileName = logs/all.log
appender.allFile.filePattern = logs/all.log.%i.gz
appender.allFile.layout.type = PatternLayout
appender.allFile.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5p %c - %m%n
appender.allFile.policies.type = Policies
appender.allFile.policies.size.type = SizeBasedTriggeringPolicy
appender.allFile.policies.size.size = 100MB
appender.allFile.strategy.type = DefaultRolloverStrategy
appender.allFile.strategy.max = 5

# LocalProcessor 专用 logger：所有 com.leejean.flink.LocalProcessorFunction 的日志单独写文件
# 这里把"业务关键日志"分离出来，方便诊断 v3.4 投票流程
logger.local.name = com.leejean.flink.LocalProcessorFunction
logger.local.level = INFO
logger.local.appenderRef.localFile.ref = LocalFile
logger.local.additivity = true

appender.localFile.name = LocalFile
appender.localFile.type = RollingFile
appender.localFile.fileName = logs/local-processor.log
appender.localFile.filePattern = logs/local-processor.log.%i.gz
appender.localFile.layout.type = PatternLayout
appender.localFile.layout.pattern = %d{HH:mm:ss.SSS} [%t] %-5p - %m%n
appender.localFile.policies.type = Policies
appender.localFile.policies.size.type = SizeBasedTriggeringPolicy
appender.localFile.policies.size.size = 50MB

# CoordinatorJob 专用 logger：CoordinatorFunction + DriftVoterFunction 日志
logger.coord.name = com.leejean.flink.CoordinatorFunction
logger.coord.level = INFO
logger.coord.appenderRef.coordFile.ref = CoordFile
logger.coord.additivity = true

logger.voter.name = com.leejean.flink.DriftVoterFunction
logger.voter.level = INFO
logger.voter.appenderRef.coordFile.ref = CoordFile
logger.voter.additivity = true

appender.coordFile.name = CoordFile
appender.coordFile.type = RollingFile
appender.coordFile.fileName = logs/coordinator.log
appender.coordFile.filePattern = logs/coordinator.log.%i.gz
appender.coordFile.layout.type = PatternLayout
appender.coordFile.layout.pattern = %d{HH:mm:ss.SSS} [%t] %-5p - %m%n
appender.coordFile.policies.type = Policies
appender.coordFile.policies.size.type = SizeBasedTriggeringPolicy
appender.coordFile.policies.size.size = 50MB

# 降低 Kafka / Flink 框架的日志级别，避免淹没业务日志
logger.kafka.name = org.apache.kafka
logger.kafka.level = WARN
logger.flink.name = org.apache.flink
logger.flink.level = INFO
